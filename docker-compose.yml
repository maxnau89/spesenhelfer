services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reisekosten-api
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/reisekosten.db
      UPLOAD_DIR: /data/uploads
      CORS_ORIGINS: '["https://platform.alphatransition.com","http://localhost:5173","http://localhost:4173"]'
      API_HOST: 0.0.0.0
      API_PORT: 8011
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Must match JWT_SECRET_KEY from wsai docker-compose to accept its tokens
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    ports:
      - "127.0.0.1:8011:8011"
    volumes:
      - reisekosten_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  reisekosten_data:
    driver: local
